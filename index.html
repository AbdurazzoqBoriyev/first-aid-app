<button class="check-btn" onclick="checkPulse()">Tekshir</button>
<p id="result"></p>

<script>
function checkPulse() {
  let pulse = document.getElementById("pulse").value;
  let result = "";

  if (pulse >= 60 && pulse <= 100) {
    result = "Normal ✅";
  } else if (pulse > 100) {
    result = "Juda tez ⚠️";
  } else {
    result = "Juda sekin ⚠️";
  }

  document.getElementById("result").innerText = result;
}
</script>
